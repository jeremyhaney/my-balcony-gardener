<!DOCTYPE html>
<html>
<head>
  <title>🌿 My Balcony Gardener</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      padding: 1rem;
    }
    h1 {
      color: #3a7f3d;
    }
    .data {
      font-size: 1.2rem;
      line-height: 2rem;
    }
    .water-button {
      background: #3a7f3d;
      color: white;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>My Balcony Gardener</h1>
  <div id="log" class="data">Loading...</div>
  <button class="water-button" onclick="fetch('/water')">💧 Water Now</button>

  <script>
    async function updateData() {
      try {
        const res = await fetch('/logs');
        const data = await res.json();
        const last = data[data.length - 1];
        document.getElementById('log').innerHTML = `
          🌡 Temp: ${last.tempF.toFixed(1)} °F<br/>
          💧 Humidity: ${last.humidity.toFixed(1)} %<br/>
          🌴 Moisture: ${last.moisture.toFixed(1)} %<br/>
          🕒 Last Update: ${new Date(last.timestamp).toLocaleString()}<br/>
          💧 Last Watered: ${
            data.reverse().find(d => d.duration > 0)
              ? new Date(data.findLast(d => d.duration > 0).timestamp).toLocaleString()
              : 'N/A'
          }
        `;
      } catch (e) {
        document.getElementById('log').textContent = '⚠️ Failed to fetch data.';
        console.error(e);
      }
    }
    updateData();
    setInterval(updateData, 5000);
  </script>
</body>
</html>
